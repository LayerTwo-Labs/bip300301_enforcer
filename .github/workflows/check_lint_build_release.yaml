name: Check, Lint, Test, Build, Release

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check-prettier:
    name: Check Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Prettier formatting
        uses: actionsx/prettier@v2
        with:
          args: --check .

  check-rustfmt:
    name: Check Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # nightly is needed for formatting imports correctly
      - name: Install latest nightly toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: x86_64-unknown-linux-gnu

      - name: Check Rust formatting
        # import formatting is nightly only
        run: cargo +nightly fmt --all -- --check

  check-clippy-nightly:
    name: Check Clippy (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: clippy

      - name: Check Clippy
        # We want to hunt for unqualified local imports, but that requires nightly.
        # Nightly introduces a bunch of new errors - we therefore run clippy in
        # two stages: one regular, and one on nightly with specifically only
        # checking for unqualified local imports.
        # prettier-ignore
        run: cargo +nightly clippy -- -A clippy::all -D unqualified_local_imports -Zcrate-attr="feature(unqualified_local_imports)"

  check-clippy:
    name: Check, Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      # Must happen /after/ the checkout step, to pick up the toolchain
      # from the `rust-toolchain.toml` file.
      - name: Install toolchain
        run: |
          rustup install 
          rustup component add clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: x86_64-unknown-linux-gnu

      - name: Cargo check
        run: cargo check --all-targets

      - name: Clippy
        run: |
          cargo clippy --all-targets

  # Parses `CI_BITCOIN_CORE_VERSIONS` out of `lib/version.rs` and emits
  # the integration-test matrix. Keeping the list of stock versions in
  # source means the Rust-side `SUPPORTED_BITCOIN_CORE_MAJORS` and the CI
  # matrix can't drift — a unit test (`ci_versions_match_majors`) asserts
  # the two are consistent.
  compute-integration-matrix:
    name: Compute integration-test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse CI_BITCOIN_CORE_VERSIONS from lib/version.rs
        id: build
        run: |
          set -euo pipefail
          VERSIONS=$(grep -oE '"[0-9]+\.[0-9]+"' lib/version.rs | tr -d '"')
          COUNT=$(printf '%s\n' "$VERSIONS" | grep -c . || true)
          if [ "$COUNT" -ne 3 ]; then
            echo "expected 3 versions in lib/version.rs, found $COUNT:" >&2
            printf '%s\n' "$VERSIONS" >&2
            exit 1
          fi
          for v in $VERSIONS; do
            if ! echo "$v" | grep -qE '^[0-9]+\.[0-9]+$'; then
              echo "invalid version in lib/version.rs: '$v'" >&2
              exit 1
            fi
          done
          ITEMS='{"flavor":"patched"}'
          for v in $VERSIONS; do
            ITEMS="$ITEMS,{\"flavor\":\"stock\",\"version\":\"$v\"}"
          done
          MATRIX="{\"include\":[${ITEMS}]}"
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "$MATRIX"

  integration-test:
    name:
      Integration test (${{ matrix.flavor == 'patched' && 'bitcoin-patched' ||
      format('Bitcoin Core {0}', matrix.version) }})
    needs: compute-integration-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.compute-integration-matrix.outputs.matrix) }}
    env:
      ELECTRS_VERSION: v3.2.0
    steps:
      - name: Download Bitcoin Core (patched)
        if: matrix.flavor == 'patched'
        run: |
          pushd ..
          wget https://releases.drivechain.info/L1-bitcoin-patched-latest-x86_64-unknown-linux-gnu.zip
          unzip L1-bitcoin-patched-latest-x86_64-unknown-linux-gnu.zip
          rm L1-bitcoin-patched-latest-x86_64-unknown-linux-gnu.zip
          mv L1-bitcoin-patched-latest-x86_64-unknown-linux-gnu bitcoin-bins
          chmod +x bitcoin-bins/bitcoind
          chmod +x bitcoin-bins/bitcoin-cli
          chmod +x bitcoin-bins/bitcoin-util
          popd

      - name: Download Bitcoin Core (stock ${{ matrix.version }})
        if: matrix.flavor == 'stock'
        run: |
          pushd ..
          VERSION='${{ matrix.version }}'
          TARBALL="bitcoin-${VERSION}-x86_64-linux-gnu.tar.gz"
          wget "https://bitcoincore.org/bin/bitcoin-core-${VERSION}/${TARBALL}"
          tar -xf "${TARBALL}"
          rm "${TARBALL}"
          mv "bitcoin-${VERSION}/bin" bitcoin-bins
          rm -r "bitcoin-${VERSION}"
          chmod +x bitcoin-bins/bitcoind
          chmod +x bitcoin-bins/bitcoin-cli
          chmod +x bitcoin-bins/bitcoin-util
          popd

      - name:
          Download stock Bitcoin Core 30.2 (BITCOIND_UNPATCHED for mixed-version
          tests)
        # `test_peer_bmm_request` exercises a cross-binary p2p path via
        # `BITCOIND_UNPATCHED`. For the stock matrix we reuse the same
        # stock binary; for the patched job we still want a stock 30.2
        # alongside the patched binaries.
        if: matrix.flavor == 'patched'
        run: |
          pushd ..
          wget https://bitcoincore.org/bin/bitcoin-core-30.2/bitcoin-30.2-x86_64-linux-gnu.tar.gz
          tar -xf bitcoin-30.2-x86_64-linux-gnu.tar.gz
          rm bitcoin-30.2-x86_64-linux-gnu.tar.gz
          mv bitcoin-30.2/bin bitcoin-unpatched-bins
          rm -r bitcoin-30.2
          popd

      - name: Checkout bitcoin-patched for signet miner script
        # The enforcer itself auto-downloads the miner script at runtime
        # (see `lib/wallet/mine.rs::get_signet_miner_path`), but the
        # integration test harness drives mining externally and still
        # requires `SIGNET_MINER` to point at the script. Stock Bitcoin
        # Core tarballs don't ship `contrib/signet/miner`, and the
        # patched variant's `--getblocktemplate-command` support is what
        # our signet tests rely on — so we fetch it here for both flavors.
        run: |
          pushd ..
          git clone https://github.com/LayerTwo-Labs/bitcoin-patched.git
          popd

      - name: Cache electrs binary
        id: cache-electrs
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/electrs/target/release/electrs
          key: electrs-binary-${{ env.ELECTRS_VERSION }}

      - name: Install electrs
        if: steps.cache-electrs.outputs.cache-hit != 'true'
        run: |
          git clone --branch ${{ env.ELECTRS_VERSION }} --depth 1 https://github.com/mempool/electrs.git ${{ runner.temp }}/electrs
          cd ${{ runner.temp }}/electrs
          cargo build --locked --release

      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      # `rustup` is already installed on GitHub Actions runners, so
      # this reads the content from our `rust-toolchain.toml` file.
      # Must happen /after/ the checkout step.
      - name: Install Rust toolchain
        run: rustup install

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: x86_64-unknown-linux-gnu

      - name: Build (debug)
        run: cargo build

      - name: Run integration tests
        # Stock Bitcoin Core rejects drivechain deposit transactions with
        # `mempool-script-verify-flag-failed (NOPx reserved for soft-fork
        # upgrades)` — the consensus rules repurposing those opcodes only
        # live in bitcoin-patched — so we skip `deposit_withdraw_roundtrip`
        # on stock. The remaining tests exercise RPC, block-parser, p2p,
        # and mempool integration with upstream Bitcoin Core.
        run: |
          export BIP300301_ENFORCER='target/debug/bip300301_enforcer'
          export BITCOIND='../bitcoin-bins/bitcoind'
          export BITCOIN_CLI='../bitcoin-bins/bitcoin-cli'
          export BITCOIN_UTIL='../bitcoin-bins/bitcoin-util'
          export ELECTRS='${{ runner.temp }}/electrs/target/release/electrs'
          export SIGNET_MINER='../bitcoin-patched/contrib/signet/miner'
          if [ '${{ matrix.flavor }}' = 'patched' ]; then
            export BITCOIND_UNPATCHED='../bitcoin-unpatched-bins/bitcoind'
            cargo run --example integration_tests
          else
            export BITCOIND_UNPATCHED='../bitcoin-bins/bitcoind'
            cargo run --example integration_tests -- --skip deposit_withdraw_roundtrip
          fi

  test-build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: x86_64-unknown-linux-gnu
            binary-suffix: ""
            rustflags: ""

          - os: macos-latest-large
            name: x86_64-apple-darwin
            binary-suffix: ""
            rustflags: ""

          - os: ubuntu-latest
            name: x86_64-pc-windows-gnu
            binary-suffix: .exe
            rustflags: "-C linker=/usr/bin/x86_64-w64-mingw32-gcc"

    name: Test, Build, Release (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: [check-clippy, check-clippy-nightly]
    permissions:
      contents: write
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      # Must happen /after/ the checkout step, to pick up the toolchain
      - run: rustup target add ${{ matrix.name }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Install windows-specific deps
        run: sudo apt install mingw-w64 nasm
        if: ${{ matrix.name == 'x86_64-pc-windows-gnu' }}

      - name: Test
        run: cargo test --tests

      - name: Build
        run: cargo build --release --target ${{ matrix.name }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: "Set environment variables: version number and output filenames"
        run: |
          # We still capture the version, but won't use it in the final binary name
          APP_VERSION=$(cargo metadata --format-version 1 | \
            jq -er '.packages | map(select(.name == "bip300301_enforcer") | .version) | .[0]')
          # Use 'latest' in the filename instead of the version
          APP_DIRNAME="bip300301-enforcer-latest-${{ matrix.name }}"
          APP_FILENAME="${APP_DIRNAME}${{ matrix.binary-suffix }}"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "APP_FILENAME=$APP_FILENAME" >> "$GITHUB_ENV"
          echo "APP_DIRNAME=$APP_DIRNAME" >> "$GITHUB_ENV"

      - run: |
          mkdir release
          cp target/${{ matrix.name }}/release/bip300301_enforcer${{ matrix.binary-suffix }} release/${{ env.APP_FILENAME }}

      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_DIRNAME }}
          if-no-files-found: error
          path: |
            release/${{ env.APP_FILENAME }}

      - name: Release
        uses: softprops/action-gh-release@v2.0.2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/${{ env.APP_FILENAME }}
          fail_on_unmatched_files: true

  upload-releases-to-releases-drivechain-info:
    name: Upload releases to releases.drivechain.info
    runs-on: ubuntu-latest
    needs: [integration-test, test-build-release]
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create zip files for releases.drivechain.info
        run: |
          shopt -s extglob
          zip -r bip300301-enforcer-latest-x86_64-apple-darwin.zip bip300301-enforcer-latest-x86_64-apple-darwin
          zip -r bip300301-enforcer-latest-x86_64-pc-windows-gnu.zip bip300301-enforcer-latest-x86_64-pc-windows-gnu
          zip -r bip300301-enforcer-latest-x86_64-unknown-linux-gnu.zip bip300301-enforcer-latest-x86_64-unknown-linux-gnu

      - name: Upload release assets to releases.drivechain.info
        uses: appleboy/scp-action@v1
        with:
          host: 45.33.96.47
          username: root
          password: ${{ secrets.RELEASES_SERVER_PW }}
          port: 22
          source: "bip300301-enforcer-latest-*.zip"
          target: "/var/www/html/"
