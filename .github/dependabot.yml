version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # connectrpc pins buffa with a hard requirement, so the
      # two stacks can must move together
      buffa:
        patterns:
          - "buffa"
          - "buffa-*"
          - "connectrpc"
          - "connectrpc-*"
      cargo-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
