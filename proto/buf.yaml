# Protos for the enforcer's gRPC API.
#
# Vendored from LayerTwo-Labs/cusf_sidechain_proto at
# cdc2f279cc2edeeda0acaeca7ff937427aa500f1 -- the ref buf.gen.yaml used to fetch
# on every generate. They are checked in so this repo can define protos of its
# own alongside them: a local file must sit in the same closure as the upstream
# ones to import their messages, and `reflect_mode=bridge` needs that whole
# closure in one generator invocation for gRPC reflection to cover every service.
#
# To take upstream changes, re-export over this directory, then `just generate`:
#
#   buf export 'https://github.com/LayerTwo-Labs/cusf_sidechain_proto.git#ref=<SHA>,subdir=proto' -o proto
version: v2
modules:
  - path: .
