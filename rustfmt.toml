edition = "2021"

# Sort every `use` list alphabetically
reorder_imports = true

# Force std / external / local groups separated by one blank line
group_imports = "StdExternalCrate"

# Control how paths are collapsed:
#  * "Preserve" – keep whatever is written
#  * "Crate"    – merge paths from the same root crate
#  * "Module"   – merge paths at module level
imports_granularity = "Crate"

# Skip buf-generated code. The pattern is a bare
# directory name because cargo fmt
# walks via the `#[path = "../generated/..."]` mod attribute and passes
# rustfmt a non-canonicalized path like `lib/proto/cusf/../generated/foo.rs`,
# which `lib/proto/generated` as an anchored pattern would miss.
ignore = ["generated"]
