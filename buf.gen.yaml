# https://buf.build/docs/configuration/v2/buf-gen-yaml/
#
# Generated Rust code is checked in under lib/proto/generated/.
# Regenerate with `just generate`.
version: v2

inputs:
  - git_repo: https://github.com/LayerTwo-Labs/cusf_sidechain_proto.git
    ref: ae311734e3146e2c99934e713be353d1a6aea7df
    subdir: proto

plugins:
  - remote: buf.build/anthropics/buffa:v0.7.1
    out: lib/proto/generated/buffa
    # NB: `reflect_mode=bridge` needs the plugin to see the full file closure
    # in one invocation, or the embedded descriptor pools will not cover the
    # other packages' services (and reflection would miss them). Local plugins
    # need `strategy: all` for this; remote plugins always execute against the
    # whole input (buf rejects an explicit `strategy` key for them).
    opt:
      - file_per_package=true # needed for remote generation to work
      - unknown_fields=false # makes destructuring more ergonomic
      - json=true # serde impls for the Connect JSON wire format
      - views=true # zero-copy *View types used by handler signatures
      - reflect_mode=bridge # embed descriptors + emit descriptor_pool(), drives gRPC reflection
  - remote: buf.build/anthropics/connect-rust:v0.7.0
    out: lib/proto/generated/connect
    opt:
      - file_per_package
      - buffa_module=crate::proto::generated::buffa
